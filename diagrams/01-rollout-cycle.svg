<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui, -apple-system, sans-serif">
  <title>The universal rollout cycle</title>
  <desc>The five-stage loop every RL post-training framework instantiates: generate → score → filter → train → sync weights → repeat.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7253ed"/>
    </marker>
    <linearGradient id="centerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f2ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect width="900" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="600" fill="#27262b">The universal rollout cycle</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#5c5962">Every RL post-training framework instantiates this five-stage loop.</text>

  <!-- Center hub -->
  <circle cx="450" cy="310" r="80" fill="url(#centerBg)" stroke="#7253ed" stroke-width="2"/>
  <text x="450" y="300" text-anchor="middle" font-size="14" font-weight="600" fill="#7253ed">One step</text>
  <text x="450" y="320" text-anchor="middle" font-size="11" fill="#5c5962">repeat ~1000×</text>
  <text x="450" y="338" text-anchor="middle" font-size="11" fill="#5c5962">per training run</text>

  <!-- Stage 1: Generate -->
  <g>
    <circle cx="450" cy="160" r="56" fill="#fff" stroke="#2869e6" stroke-width="2"/>
    <text x="450" y="155" text-anchor="middle" font-size="14" font-weight="600" fill="#27262b">① Generate</text>
    <text x="450" y="175" text-anchor="middle" font-size="11" fill="#5c5962">SGLang / vLLM</text>
  </g>

  <!-- Stage 2: Score -->
  <g>
    <circle cx="730" cy="260" r="56" fill="#fff" stroke="#d4a800" stroke-width="2"/>
    <text x="730" y="255" text-anchor="middle" font-size="14" font-weight="600" fill="#27262b">② Score</text>
    <text x="730" y="275" text-anchor="middle" font-size="11" fill="#5c5962">reward model</text>
  </g>

  <!-- Stage 3: Filter -->
  <g>
    <circle cx="640" cy="450" r="56" fill="#fff" stroke="#026e57" stroke-width="2"/>
    <text x="640" y="445" text-anchor="middle" font-size="14" font-weight="600" fill="#27262b">③ Filter</text>
    <text x="640" y="465" text-anchor="middle" font-size="11" fill="#5c5962">quality / dedup</text>
  </g>

  <!-- Stage 4: Train -->
  <g>
    <circle cx="260" cy="450" r="56" fill="#fff" stroke="#dd2e2e" stroke-width="2"/>
    <text x="260" y="445" text-anchor="middle" font-size="14" font-weight="600" fill="#27262b">④ Train</text>
    <text x="260" y="465" text-anchor="middle" font-size="11" fill="#5c5962">Megatron / FSDP</text>
  </g>

  <!-- Stage 5: Sync -->
  <g>
    <circle cx="170" cy="260" r="56" fill="#fff" stroke="#7253ed" stroke-width="2"/>
    <text x="170" y="255" text-anchor="middle" font-size="14" font-weight="600" fill="#27262b">⑤ Sync</text>
    <text x="170" y="275" text-anchor="middle" font-size="11" fill="#5c5962">new weights</text>
  </g>

  <!-- Arrows between stages -->
  <path d="M 502 178 Q 615 195 685 230" fill="none" stroke="#7253ed" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 730 318 Q 720 410 685 425" fill="none" stroke="#7253ed" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 586 470 Q 450 510 314 470" fill="none" stroke="#7253ed" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 218 420 Q 175 380 175 318" fill="none" stroke="#7253ed" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 215 230 Q 290 185 398 178" fill="none" stroke="#7253ed" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Annotations between stages (what flows) -->
  <text x="600" y="195" text-anchor="middle" font-size="10" fill="#959396" font-style="italic">tokens + logprobs</text>
  <text x="755" y="380" text-anchor="start" font-size="10" fill="#959396" font-style="italic">scalar rewards</text>
  <text x="450" y="515" text-anchor="middle" font-size="10" fill="#959396" font-style="italic">batched experience</text>
  <text x="135" y="380" text-anchor="end" font-size="10" fill="#959396" font-style="italic">policy θₜ₊₁</text>
  <text x="305" y="200" text-anchor="middle" font-size="10" fill="#959396" font-style="italic">handle tuples (zero-copy)</text>

  <!-- Bottom note -->
  <text x="450" y="552" text-anchor="middle" font-size="12" fill="#5c5962">Latency of one cycle dominates RL economics — every primitive in this course makes one stage cheaper.</text>
</svg>
