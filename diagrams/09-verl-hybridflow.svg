<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="system-ui, -apple-system, sans-serif">
  <title>verl HybridFlow — one controller, many worker groups</title>
  <desc>Algorithm code runs in one Python process. Computation runs across hundreds of GPUs. DataProto flows between them via WorkerGroup dispatch.</desc>

  <defs>
    <marker id="arr9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27262b"/>
    </marker>
    <marker id="arr9p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7253ed"/>
    </marker>
    <marker id="arr9g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#026e57"/>
    </marker>
  </defs>

  <rect width="1100" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="600" fill="#27262b">verl HybridFlow — one controller, many worker groups</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#5c5962">Algorithm code runs in one Python process. Computation runs across hundreds of GPUs.</text>

  <!-- =============== CONTROLLER ============== -->
  <rect x="60" y="90" width="980" height="250" rx="8" fill="#fdfaff" stroke="#7253ed" stroke-width="2"/>
  <rect x="60" y="90" width="980" height="34" rx="8" fill="#f5f2ff"/>
  <text x="78" y="113" font-size="13" font-weight="700" fill="#5f3ceb" letter-spacing="0.06em">CONTROLLER · single Python process · the PPO/GRPO algorithm loop</text>

  <!-- Pseudo-code in controller -->
  <g font-family="SFMono-Regular, Menlo, monospace" font-size="13" fill="#27262b">
    <text x="90" y="148">for prompt in dataloader:</text>
    <text x="110" y="166">batch = DataProto(prompt)</text>
    <text x="110" y="186">gen     = <tspan fill="#7253ed" font-weight="600">actor_rollout_ref_wg.generate_sequences(batch)</tspan></text>
    <text x="110" y="204">batch   = batch.union(gen)</text>
    <text x="110" y="222">old_lp  = <tspan fill="#7253ed" font-weight="600">actor_rollout_ref_wg.compute_log_prob(batch)</tspan></text>
    <text x="110" y="240">ref_lp  = <tspan fill="#7253ed" font-weight="600">actor_rollout_ref_wg.compute_ref_log_prob(batch)</tspan></text>
    <text x="110" y="258">values  = <tspan fill="#026e57" font-weight="600">critic_wg.compute_values(batch)</tspan></text>
    <text x="110" y="276">rewards = <tspan fill="#b85c00" font-weight="600">reward_wg.compute_scores(batch)</tspan></text>
    <text x="110" y="294">batch   = batch.union(old_lp, ref_lp, values, rewards)</text>
    <text x="110" y="312">batch   = compute_advantage(batch)   <tspan fill="#959396">← controller-side, no remote call</tspan></text>
    <text x="110" y="330">_ = <tspan fill="#7253ed" font-weight="600">actor_rollout_ref_wg.update_actor(batch)</tspan>;  _ = <tspan fill="#026e57" font-weight="600">critic_wg.update_critic(batch)</tspan></text>
  </g>

  <!-- DataProto annotation on the right of controller -->
  <rect x="720" y="148" width="300" height="105" rx="4" fill="#fff" stroke="#7253ed" stroke-dasharray="4,3"/>
  <text x="870" y="167" text-anchor="middle" font-size="11" font-weight="700" fill="#5f3ceb">DataProto · the data envelope</text>
  <text x="730" y="186" font-size="11" fill="#27262b" font-family="SFMono-Regular, monospace">batch:          TensorDict</text>
  <text x="730" y="204" font-size="11" fill="#27262b" font-family="SFMono-Regular, monospace">non_tensor_batch: dict (uid, ...)</text>
  <text x="730" y="222" font-size="11" fill="#27262b" font-family="SFMono-Regular, monospace">meta_info:      dict</text>
  <text x="730" y="244" font-size="10" fill="#5c5962" font-style="italic">.union() composes fields onto same batch dim</text>

  <!-- =============== DISPATCH ARROWS ============== -->
  <!-- Three arrows from controller to three WGs -->
  <text x="550" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#27262b" font-style="italic">@register(dispatch_mode=…) ⇒ split → execute remotely → collect</text>

  <!-- arrows from controller bottom to each WG top -->
  <path d="M 215 340 L 215 410" stroke="#7253ed" stroke-width="2" marker-end="url(#arr9p)"/>
  <text x="180" y="378" font-size="10" fill="#5f3ceb" font-weight="600">dispatch ↓</text>
  <text x="180" y="392" font-size="9" fill="#5c5962">chunk by DP</text>

  <path d="M 550 340 L 550 410" stroke="#026e57" stroke-width="2" marker-end="url(#arr9g)"/>

  <path d="M 870 340 L 870 410" stroke="#b85c00" stroke-width="2" marker-end="url(#arr9p)" style="--marker-fill: #b85c00;"/>

  <!-- =============== THREE WORKER GROUPS ============== -->

  <!-- WG 1: actor_rollout_ref_wg -->
  <rect x="60" y="410" width="320" height="320" rx="8" fill="#fdfaff" stroke="#7253ed" stroke-width="2"/>
  <rect x="60" y="410" width="320" height="34" rx="8" fill="#f5f2ff"/>
  <text x="220" y="432" text-anchor="middle" font-size="13" font-weight="700" fill="#5f3ceb">actor_rollout_ref_wg</text>

  <text x="220" y="458" text-anchor="middle" font-size="11" fill="#5c5962" font-style="italic">three roles fused into one worker class</text>

  <!-- 4 worker mini-boxes -->
  <g>
    <rect x="80" y="475" width="135" height="100" rx="4" fill="#fff" stroke="#7253ed"/>
    <text x="148" y="494" text-anchor="middle" font-size="11" font-weight="600" fill="#27262b">Worker 0</text>
    <line x1="90" y1="502" x2="205" y2="502" stroke="#e6e1e8"/>
    <text x="90" y="518" font-size="10" fill="#5c5962">⊕ Training engine</text>
    <text x="95" y="532" font-size="9" fill="#959396">FSDP / Megatron</text>
    <text x="90" y="550" font-size="10" fill="#5c5962">⊕ Rollout engine</text>
    <text x="95" y="564" font-size="9" fill="#959396">SGLang / vLLM</text>

    <rect x="225" y="475" width="135" height="100" rx="4" fill="#fff" stroke="#7253ed"/>
    <text x="293" y="494" text-anchor="middle" font-size="11" font-weight="600" fill="#27262b">Worker 1</text>
    <line x1="235" y1="502" x2="350" y2="502" stroke="#e6e1e8"/>
    <text x="235" y="518" font-size="10" fill="#5c5962">⊕ Training engine</text>
    <text x="240" y="532" font-size="9" fill="#959396">FSDP / Megatron</text>
    <text x="235" y="550" font-size="10" fill="#5c5962">⊕ Rollout engine</text>
    <text x="240" y="564" font-size="9" fill="#959396">SGLang / vLLM</text>

    <rect x="80" y="585" width="135" height="100" rx="4" fill="#fff" stroke="#7253ed"/>
    <text x="148" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#27262b">Worker 2</text>
    <line x1="90" y1="612" x2="205" y2="612" stroke="#e6e1e8"/>
    <text x="90" y="628" font-size="10" fill="#5c5962">⊕ Training engine</text>
    <text x="95" y="642" font-size="9" fill="#959396">FSDP / Megatron</text>
    <text x="90" y="660" font-size="10" fill="#5c5962">⊕ Rollout engine</text>
    <text x="95" y="674" font-size="9" fill="#959396">SGLang / vLLM</text>

    <rect x="225" y="585" width="135" height="100" rx="4" fill="#fff" stroke="#7253ed"/>
    <text x="293" y="604" text-anchor="middle" font-size="11" font-weight="600" fill="#27262b">Worker 3</text>
    <line x1="235" y1="612" x2="350" y2="612" stroke="#e6e1e8"/>
    <text x="235" y="628" font-size="10" fill="#5c5962">⊕ Training engine</text>
    <text x="240" y="642" font-size="9" fill="#959396">FSDP / Megatron</text>
    <text x="235" y="660" font-size="10" fill="#5c5962">⊕ Rollout engine</text>
    <text x="240" y="674" font-size="9" fill="#959396">SGLang / vLLM</text>
  </g>

  <text x="220" y="710" text-anchor="middle" font-size="10" fill="#5c5962" font-style="italic">Hybrid engine: weight sync between training ↔ rollout</text>

  <!-- WG 2: critic_wg -->
  <rect x="395" y="410" width="320" height="320" rx="8" fill="#f0fdf9" stroke="#026e57" stroke-width="2"/>
  <rect x="395" y="410" width="320" height="34" rx="8" fill="#dcfce7" fill-opacity="0.5"/>
  <text x="555" y="432" text-anchor="middle" font-size="13" font-weight="700" fill="#026e57">critic_wg</text>

  <text x="555" y="458" text-anchor="middle" font-size="11" fill="#5c5962" font-style="italic">value function · optional, only when PPO</text>

  <g>
    <rect x="415" y="475" width="135" height="80" rx="4" fill="#fff" stroke="#026e57"/>
    <text x="483" y="494" text-anchor="middle" font-size="11" font-weight="600" fill="#27262b">Worker 0</text>
    <line x1="425" y1="502" x2="540" y2="502" stroke="#e6e1e8"/>
    <text x="425" y="518" font-size="10" fill="#5c5962">⊕ Training engine</text>
    <text x="430" y="532" font-size="9" fill="#959396">FSDP / Megatron</text>
    <text x="425" y="548" font-size="9" fill="#959396">(no rollout)</text>

    <rect x="560" y="475" width="135" height="80" rx="4" fill="#fff" stroke="#026e57"/>
    <text x="628" y="494" text-anchor="middle" font-size="11" font-weight="600" fill="#27262b">Worker 1</text>
    <line x1="570" y1="502" x2="685" y2="502" stroke="#e6e1e8"/>
    <text x="570" y="518" font-size="10" fill="#5c5962">⊕ Training engine</text>
    <text x="575" y="532" font-size="9" fill="#959396">FSDP / Megatron</text>
    <text x="570" y="548" font-size="9" fill="#959396">(no rollout)</text>

    <rect x="415" y="565" width="135" height="80" rx="4" fill="#fff" stroke="#026e57"/>
    <text x="483" y="584" text-anchor="middle" font-size="11" font-weight="600" fill="#27262b">Worker 2</text>
    <line x1="425" y1="592" x2="540" y2="592" stroke="#e6e1e8"/>
    <text x="425" y="608" font-size="10" fill="#5c5962">⊕ Training engine</text>

    <rect x="560" y="565" width="135" height="80" rx="4" fill="#fff" stroke="#026e57"/>
    <text x="628" y="584" text-anchor="middle" font-size="11" font-weight="600" fill="#27262b">Worker 3</text>
    <line x1="570" y1="592" x2="685" y2="592" stroke="#e6e1e8"/>
    <text x="570" y="608" font-size="10" fill="#5c5962">⊕ Training engine</text>
  </g>

  <text x="555" y="685" text-anchor="middle" font-size="11" font-weight="600" fill="#026e57">compute_values · update_critic</text>
  <text x="555" y="710" text-anchor="middle" font-size="10" fill="#5c5962" font-style="italic">GAE returns flow back to controller</text>

  <!-- WG 3: reward_wg -->
  <rect x="730" y="410" width="310" height="320" rx="8" fill="#fff8e6" stroke="#b85c00" stroke-width="2"/>
  <rect x="730" y="410" width="310" height="34" rx="8" fill="#fef3c7" fill-opacity="0.5"/>
  <text x="885" y="432" text-anchor="middle" font-size="13" font-weight="700" fill="#b85c00">reward_wg / reward_model</text>

  <text x="885" y="458" text-anchor="middle" font-size="11" fill="#5c5962" font-style="italic">optional · scoring trajectories</text>

  <g>
    <rect x="750" y="475" width="270" height="60" rx="4" fill="#fff" stroke="#b85c00"/>
    <text x="885" y="495" text-anchor="middle" font-size="11" font-weight="600" fill="#27262b">RewardWorker · forward()</text>
    <text x="885" y="513" text-anchor="middle" font-size="10" fill="#5c5962">model-based RM or rule-based grader</text>
    <text x="885" y="527" text-anchor="middle" font-size="10" fill="#5c5962">(math verifier, code execute, etc.)</text>

    <rect x="750" y="545" width="270" height="50" rx="4" fill="#fff" stroke="#b85c00" stroke-dasharray="4,3"/>
    <text x="885" y="565" text-anchor="middle" font-size="11" font-weight="600" fill="#b85c00">teacher_wg (OPD mode)</text>
    <text x="885" y="582" text-anchor="middle" font-size="10" fill="#5c5962">score student trajectories with teacher logits</text>
  </g>

  <text x="885" y="640" text-anchor="middle" font-size="11" font-weight="600" fill="#b85c00">compute_scores → batch.union()</text>

  <!-- key insight callout at bottom -->
  <rect x="60" y="745" width="980" height="42" rx="6" fill="#f5f2ff" stroke="#7253ed"/>
  <text x="550" y="763" text-anchor="middle" font-size="12" fill="#27262b">
    <tspan font-weight="600">The bet:</tspan> control flow (algorithm) and computation flow (engines) are two different abstractions.
  </text>
  <text x="550" y="780" text-anchor="middle" font-size="11" fill="#5c5962" font-style="italic">
    Swap FSDP for Megatron, or vLLM for SGLang — the controller code does not change. Same PPO loop, different worker backend.
  </text>
</svg>
