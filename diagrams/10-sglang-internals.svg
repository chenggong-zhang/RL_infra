<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="system-ui, -apple-system, sans-serif">
  <title>SGLang as RL substrate — the two-way contract</title>
  <desc>RL frameworks send control commands down to SGLang's scheduler; SGLang sends generated rollout data back up. The scheduler is composed from mixins; underneath sit the RadixCache, memory pool, and model runner.</desc>

  <defs>
    <marker id="arr10d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7253ed"/>
    </marker>
    <marker id="arr10u" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b85c00"/>
    </marker>
  </defs>

  <rect width="1100" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="600" fill="#27262b">SGLang as RL rollout substrate — the two-way contract</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#5c5962">The control plane every RL framework talks to. One verb, four transports; six invariants enforced structurally.</text>

  <!-- ============== TRAINER (TOP) ============== -->
  <rect x="60" y="90" width="980" height="80" rx="8" fill="#fdfaff" stroke="#7253ed" stroke-width="2"/>
  <rect x="60" y="90" width="980" height="32" rx="8" fill="#f5f2ff"/>
  <text x="78" y="112" font-size="13" font-weight="700" fill="#5f3ceb" letter-spacing="0.06em">TRAINER · Miles · slime · verl · AReaL</text>

  <text x="550" y="142" text-anchor="middle" font-size="12" fill="#27262b">drives the rollout cycle · sends control commands · consumes generation outputs</text>
  <text x="550" y="158" text-anchor="middle" font-size="11" fill="#5c5962" font-style="italic">trainer doesn't care which HTTP / IPC / ZMQ transport SGLang uses internally</text>

  <!-- ============== CONTROL ARROWS (going DOWN) ============== -->
  <!-- 4 arrows going down with labels -->
  <g>
    <line x1="155" y1="180" x2="155" y2="230" stroke="#7253ed" stroke-width="2" marker-end="url(#arr10d)"/>
    <text x="155" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#5f3ceb" font-family="SFMono-Regular, monospace">generate(</text>
    <text x="155" y="213" text-anchor="middle" font-size="9" fill="#5f3ceb">return_logprob,</text>
    <text x="155" y="225" text-anchor="middle" font-size="9" fill="#5f3ceb">return_routed_experts)</text>

    <line x1="350" y1="180" x2="350" y2="230" stroke="#7253ed" stroke-width="2" marker-end="url(#arr10d)"/>
    <text x="350" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#5f3ceb" font-family="SFMono-Regular, monospace">update_weights_from_*</text>
    <text x="350" y="215" text-anchor="middle" font-size="9" fill="#5c5962">tensor · disk ·</text>
    <text x="350" y="226" text-anchor="middle" font-size="9" fill="#5c5962">distributed · ipc</text>

    <line x1="550" y1="180" x2="550" y2="230" stroke="#7253ed" stroke-width="2" marker-end="url(#arr10d)"/>
    <text x="550" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#5f3ceb" font-family="SFMono-Regular, monospace">release_memory_</text>
    <text x="550" y="213" text-anchor="middle" font-size="10" font-weight="600" fill="#5f3ceb" font-family="SFMono-Regular, monospace">occupation(tags)</text>
    <text x="550" y="226" text-anchor="middle" font-size="9" fill="#5c5962">kv · weights · cuda_graph</text>

    <line x1="750" y1="180" x2="750" y2="230" stroke="#7253ed" stroke-width="2" marker-end="url(#arr10d)"/>
    <text x="750" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#5f3ceb" font-family="SFMono-Regular, monospace">pause_generation</text>
    <text x="750" y="213" text-anchor="middle" font-size="10" font-weight="600" fill="#5f3ceb" font-family="SFMono-Regular, monospace">continue_generation</text>

    <line x1="945" y1="180" x2="945" y2="230" stroke="#7253ed" stroke-width="2" marker-end="url(#arr10d)"/>
    <text x="945" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#5f3ceb" font-family="SFMono-Regular, monospace">flush_cache</text>
    <text x="945" y="215" text-anchor="middle" font-size="9" fill="#5c5962">required after</text>
    <text x="945" y="226" text-anchor="middle" font-size="9" fill="#5c5962">every weight update</text>
  </g>

  <!-- ============== SCHEDULER LAYER ============== -->
  <rect x="60" y="240" width="980" height="180" rx="8" fill="#fef9f4" stroke="#b85c00" stroke-width="2"/>
  <rect x="60" y="240" width="980" height="32" rx="8" fill="#fff8e6"/>
  <text x="78" y="262" font-size="13" font-weight="700" fill="#b85c00" letter-spacing="0.06em">SCHEDULER · multi-role coordinator (mixin composition)</text>

  <!-- Mixin chips -->
  <g font-size="10" fill="#27262b">
    <rect x="80" y="285" width="180" height="26" rx="13" fill="#fff" stroke="#b85c00"/>
    <text x="170" y="302" text-anchor="middle" font-weight="600">SchedulerUpdateWeightsMixin</text>

    <rect x="270" y="285" width="180" height="26" rx="13" fill="#fff" stroke="#b85c00"/>
    <text x="360" y="302" text-anchor="middle" font-weight="600">SchedulerOutputProcessorMixin</text>

    <rect x="460" y="285" width="170" height="26" rx="13" fill="#fff" stroke="#b85c00"/>
    <text x="545" y="302" text-anchor="middle" font-weight="600">SchedulerMetricsMixin</text>

    <rect x="640" y="285" width="190" height="26" rx="13" fill="#fff" stroke="#b85c00"/>
    <text x="735" y="302" text-anchor="middle" font-weight="600">DisaggregationPrefill/Decode</text>

    <rect x="840" y="285" width="180" height="26" rx="13" fill="#fff" stroke="#b85c00"/>
    <text x="930" y="302" text-anchor="middle" font-weight="600">DPAttnMixin · PPMixin · …</text>
  </g>

  <!-- Two sub-components inside scheduler -->
  <g>
    <rect x="80" y="328" width="450" height="80" rx="6" fill="#fff" stroke="#026e57" stroke-width="1.5"/>
    <text x="305" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#026e57">SchedulePolicy</text>
    <text x="305" y="365" text-anchor="middle" font-size="10" fill="#5c5962">LPM (longest-prefix-match) · DFS_WEIGHT · FCFS</text>
    <text x="305" y="380" text-anchor="middle" font-size="10" fill="#5c5962">in-batch prefix caching · PrefillAdder token budget</text>
    <text x="305" y="396" text-anchor="middle" font-size="10" fill="#5c5962" font-style="italic">turns GRPO group sharing into prefill savings</text>

    <rect x="550" y="328" width="470" height="80" rx="6" fill="#fff" stroke="#2869e6" stroke-width="1.5"/>
    <text x="785" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#2869e6">RadixCache + MemoryPool</text>
    <text x="785" y="365" text-anchor="middle" font-size="10" fill="#5c5962">prefix tree with extra_key namespace (LoRA / salt safe)</text>
    <text x="785" y="380" text-anchor="middle" font-size="10" fill="#5c5962">inc_lock_ref / dec_lock_ref · reference-counted nodes</text>
    <text x="785" y="396" text-anchor="middle" font-size="10" fill="#5c5962" font-style="italic">use-after-free unrepresentable by construction</text>
  </g>

  <!-- ============== TP WORKER ============== -->
  <rect x="60" y="430" width="980" height="80" rx="8" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="60" y="430" width="980" height="28" rx="8" fill="#f0f9ff"/>
  <text x="78" y="450" font-size="13" font-weight="700" fill="#0284c7" letter-spacing="0.06em">TpModelWorker · the bridge to model_runner</text>
  <text x="550" y="476" text-anchor="middle" font-size="11" fill="#5c5962" font-family="SFMono-Regular, monospace">monkey_patch_torch_reductions() · MultiprocessingSerializer.deserialize() · forward_batch_generation()</text>
  <text x="550" y="494" text-anchor="middle" font-size="10" fill="#5c5962" font-style="italic">CUDA IPC tensor handles for the colocated-tensor weight-sync path live here</text>

  <!-- ============== MODEL RUNNER ============== -->
  <rect x="60" y="520" width="980" height="130" rx="8" fill="#fafafc" stroke="#27262b" stroke-width="1.5"/>
  <rect x="60" y="520" width="980" height="28" rx="8" fill="#ecebed"/>
  <text x="78" y="540" font-size="13" font-weight="700" fill="#27262b" letter-spacing="0.06em">ModelRunner · the GPU surface</text>

  <g font-size="10" fill="#27262b">
    <text x="90" y="565" font-weight="600">Parallelism:</text>
    <text x="90" y="580" fill="#5c5962">TP / PP / EP / DP-attention / CP</text>

    <text x="290" y="565" font-weight="600">Quantization:</text>
    <text x="290" y="580" fill="#5c5962">FP4 / FP8 / INT4 / BF16 GEMM configs</text>

    <text x="540" y="565" font-weight="600">Caches:</text>
    <text x="540" y="580" fill="#5c5962">paged KV pool · CUDA graphs · LoRA adapters</text>

    <text x="820" y="565" font-weight="600">RL-specific:</text>
    <text x="820" y="580" fill="#5c5962">RoutedExpertsCapturer</text>

    <text x="550" y="615" text-anchor="middle" font-size="11" fill="#5c5962" font-style="italic">forward returns generated tokens + logprobs + routed_experts to scheduler</text>
    <text x="550" y="632" text-anchor="middle" font-size="11" font-weight="600" fill="#7253ed">→ routed_experts is the first link in the MoE routing-replay chain</text>
  </g>

  <!-- ============== OUTPUT ARROWS (going UP) ============== -->
  <g>
    <line x1="200" y1="690" x2="200" y2="650" stroke="#b85c00" stroke-width="2" marker-end="url(#arr10u)"/>
    <text x="200" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#b85c00" font-family="SFMono-Regular, monospace">tokens</text>

    <line x1="400" y1="690" x2="400" y2="650" stroke="#b85c00" stroke-width="2" marker-end="url(#arr10u)"/>
    <text x="400" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#b85c00" font-family="SFMono-Regular, monospace">output_token_logprobs</text>

    <line x1="600" y1="690" x2="600" y2="650" stroke="#b85c00" stroke-width="2" marker-end="url(#arr10u)"/>
    <text x="600" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#b85c00" font-family="SFMono-Regular, monospace">routed_experts</text>
    <text x="600" y="722" text-anchor="middle" font-size="9" fill="#5c5962">(for R3 / MoE)</text>

    <line x1="800" y1="690" x2="800" y2="650" stroke="#b85c00" stroke-width="2" marker-end="url(#arr10u)"/>
    <text x="800" y="710" text-anchor="middle" font-size="10" font-weight="600" fill="#b85c00" font-family="SFMono-Regular, monospace">finish_reason</text>
    <text x="800" y="722" text-anchor="middle" font-size="9" fill="#5c5962">+ request metadata</text>
  </g>

  <!-- ============== BOTTOM INVARIANTS ============== -->
  <rect x="60" y="740" width="980" height="64" rx="6" fill="#f5f2ff" stroke="#7253ed"/>
  <text x="78" y="760" font-size="11" font-weight="700" fill="#5f3ceb" letter-spacing="0.04em">SIX INVARIANTS · enforced structurally, not by convention</text>
  <g font-size="10" fill="#27262b">
    <text x="78" y="778"><tspan font-weight="600">1.</tspan> weight update ⟹ flush_cache</text>
    <text x="290" y="778"><tspan font-weight="600">2.</tspan> release_memory_occupation ⟹ is_fully_idle()</text>
    <text x="570" y="778"><tspan font-weight="600">3.</tspan> prefix-cache namespace = tokens + extra_key</text>
    <text x="78" y="796"><tspan font-weight="600">4.</tspan> lock_ref &gt; 0 ⟹ node not evictable</text>
    <text x="290" y="796"><tspan font-weight="600">5.</tspan> DTensor.full_tensor() is collective on every rank</text>
    <text x="570" y="796"><tspan font-weight="600">6.</tspan> MoE routed_experts returned for replay</text>
  </g>
</svg>
