<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="system-ui, -apple-system, sans-serif">
  <title>Megatron-LM in RL post-training — training substrate plus native RL</title>
  <desc>Megatron-LM plays two roles: it is the training substrate that Miles/slime/verl use for gradient updates, and it is also its own native RL framework via train_rl.py and megatron/rl/. Both rest on 5D parallelism (TP × PP × DP × EP × CP).</desc>

  <defs>
    <marker id="arr11" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27262b"/>
    </marker>
    <marker id="arr11p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7253ed"/>
    </marker>
  </defs>

  <rect width="1100" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="600" fill="#27262b">Megatron-LM in RL post-training</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#5c5962">Training substrate for Miles · slime · verl, AND its own native RL framework. Both rest on 5D parallelism.</text>

  <!-- ============== TOP: TWO ROLES ============== -->

  <!-- Left: SUBSTRATE ROLE -->
  <rect x="60" y="90" width="480" height="380" rx="8" fill="#fdfaff" stroke="#7253ed" stroke-width="2"/>
  <rect x="60" y="90" width="480" height="34" rx="8" fill="#f5f2ff"/>
  <text x="78" y="113" font-size="13" font-weight="700" fill="#5f3ceb" letter-spacing="0.06em">SUBSTRATE ROLE</text>
  <text x="528" y="113" text-anchor="end" font-size="11" fill="#5c5962" font-style="italic">used by Miles · slime · verl</text>

  <text x="300" y="142" text-anchor="middle" font-size="11" fill="#5c5962" font-style="italic">four jobs every framework asks Megatron to do</text>

  <!-- Four job boxes -->
  <g>
    <rect x="80" y="160" width="440" height="65" rx="4" fill="#fff" stroke="#7253ed"/>
    <text x="100" y="180" font-size="12" font-weight="600" fill="#27262b">① Recompute logprobs</text>
    <text x="100" y="197" font-size="10" fill="#5c5962">tokens from rollout → Megatron forward → old / current / ref / teacher logprobs</text>
    <text x="100" y="213" font-size="10" fill="#5c5962" font-style="italic">why: inference kernels drift numerically; loss must use training-side numbers</text>

    <rect x="80" y="235" width="440" height="65" rx="4" fill="#fff" stroke="#7253ed"/>
    <text x="100" y="255" font-size="12" font-weight="600" fill="#27262b">② Compute loss</text>
    <text x="100" y="272" font-size="10" fill="#5c5962">PPO · GRPO · GSPO · REINFORCE++ · OPD · value loss</text>
    <text x="100" y="288" font-size="10" fill="#5c5962" font-style="italic">why: ratio truncation, KL, entropy, response loss-mask all evaluated here</text>

    <rect x="80" y="310" width="440" height="65" rx="4" fill="#fff" stroke="#7253ed"/>
    <text x="100" y="330" font-size="12" font-weight="600" fill="#27262b">③ Backward + optimizer step</text>
    <text x="100" y="347" font-size="10" fill="#5c5962">gradients · TP/PP/DP/EP/CP collectives · ZeRO / FSDP offload integration</text>
    <text x="100" y="363" font-size="10" fill="#5c5962" font-style="italic">why: this is where the new policy θ_{t+1} comes from</text>

    <rect x="80" y="385" width="440" height="65" rx="4" fill="#fff" stroke="#7253ed"/>
    <text x="100" y="405" font-size="12" font-weight="600" fill="#27262b">④ Materialize weights for rollout sync</text>
    <text x="100" y="422" font-size="10" fill="#5c5962">DTensor.full_tensor() · gather TP/EP/PP shards · convert to HF format</text>
    <text x="100" y="438" font-size="10" fill="#5c5962" font-style="italic">why: SGLang/vLLM need HF-shaped tensors via update_weights_from_*</text>
  </g>

  <!-- Right: NATIVE RL ROLE -->
  <rect x="560" y="90" width="480" height="380" rx="8" fill="#f0fdf9" stroke="#026e57" stroke-width="2"/>
  <rect x="560" y="90" width="480" height="34" rx="8" fill="#dcfce7" fill-opacity="0.5"/>
  <text x="578" y="113" font-size="13" font-weight="700" fill="#026e57" letter-spacing="0.06em">NATIVE RL ROLE</text>
  <text x="1028" y="113" text-anchor="end" font-size="11" fill="#5c5962" font-style="italic">megatron/rl/ — first-party RL stack</text>

  <text x="800" y="142" text-anchor="middle" font-size="11" fill="#5c5962" font-style="italic">Megatron has its own RL entrypoint and runtime</text>

  <g font-family="SFMono-Regular, Menlo, monospace" font-size="10">
    <rect x="580" y="160" width="440" height="55" rx="4" fill="#fff" stroke="#026e57"/>
    <text x="600" y="180" font-size="12" font-weight="600" fill="#27262b" font-family="system-ui, sans-serif">train_rl.py</text>
    <text x="600" y="197" fill="#5c5962">forward_step → get_logprobs → calculate_grpo_loss → backward</text>
    <text x="600" y="210" fill="#5c5962" font-family="system-ui, sans-serif" font-style="italic" font-size="10">RL loop built on top of the pretrain harness</text>

    <rect x="580" y="222" width="440" height="55" rx="4" fill="#fff" stroke="#026e57"/>
    <text x="600" y="242" font-size="12" font-weight="600" fill="#27262b" font-family="system-ui, sans-serif">megatron/rl/rl_utils.py</text>
    <text x="600" y="259" fill="#5c5962">rollout collection · GRPO loss · mismatch metrics · weight swap</text>
    <text x="600" y="272" fill="#5c5962" font-family="system-ui, sans-serif" font-style="italic" font-size="10">RLRuntimeState + RolloutStats with policy_epoch, kv_cache_epoch</text>

    <rect x="580" y="284" width="440" height="55" rx="4" fill="#fff" stroke="#026e57"/>
    <text x="600" y="304" font-size="12" font-weight="600" fill="#27262b" font-family="system-ui, sans-serif">sequence_packing_utils.py</text>
    <text x="600" y="321" fill="#5c5962">PackingInfo + PackedSeqParams (cu_seqlens)</text>
    <text x="600" y="334" fill="#5c5962" font-family="system-ui, sans-serif" font-style="italic" font-size="10">prevents attention leakage across packed variable-length trajectories</text>

    <rect x="580" y="346" width="440" height="55" rx="4" fill="#fff" stroke="#026e57"/>
    <text x="600" y="366" font-size="12" font-weight="600" fill="#27262b" font-family="system-ui, sans-serif">megatron/rl/inference/megatron.py</text>
    <text x="600" y="383" fill="#5c5962">MegatronLocal · MCore DynamicInferenceEngine</text>
    <text x="600" y="396" fill="#5c5962" font-family="system-ui, sans-serif" font-style="italic" font-size="10">in-process rollout: no external SGLang server needed</text>

    <rect x="580" y="408" width="440" height="48" rx="4" fill="#fff" stroke="#026e57"/>
    <text x="600" y="428" font-size="12" font-weight="600" fill="#27262b" font-family="system-ui, sans-serif">verify_model_weights_swap()</text>
    <text x="600" y="445" fill="#5c5962">deterministic forward through both copies; asserts numerics match</text>
  </g>

  <!-- ============== BOTTOM: 5D PARALLELISM ============== -->
  <rect x="60" y="498" width="980" height="220" rx="8" fill="#fafafc" stroke="#27262b" stroke-width="1.5"/>
  <rect x="60" y="498" width="980" height="32" rx="8" fill="#ecebed"/>
  <text x="78" y="520" font-size="13" font-weight="700" fill="#27262b" letter-spacing="0.06em">5D PARALLELISM — what makes both roles work at frontier scale</text>
  <text x="1028" y="520" text-anchor="end" font-size="11" fill="#5c5962">TP × PP × DP × EP × CP</text>

  <text x="550" y="548" text-anchor="middle" font-size="11" fill="#5c5962" font-style="italic">five orthogonal ways to split the same parameters, composable simultaneously</text>

  <!-- 5 columns -->
  <g>
    <!-- TP -->
    <rect x="80" y="565" width="180" height="140" rx="5" fill="#fff" stroke="#7253ed" stroke-width="1.5"/>
    <text x="170" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="#7253ed">TP</text>
    <text x="170" y="601" text-anchor="middle" font-size="10" fill="#27262b">tensor parallel</text>
    <line x1="100" y1="612" x2="240" y2="612" stroke="#e6e1e8"/>
    <text x="170" y="628" text-anchor="middle" font-size="9" fill="#5c5962">split each layer's</text>
    <text x="170" y="640" text-anchor="middle" font-size="9" fill="#5c5962">weight matrices</text>
    <text x="170" y="660" text-anchor="middle" font-size="9" fill="#5c5962" font-style="italic">within machine</text>
    <text x="170" y="672" text-anchor="middle" font-size="9" fill="#5c5962" font-style="italic">NVLink-bound</text>
    <text x="170" y="692" text-anchor="middle" font-size="8" fill="#5f3ceb">attention + MLP gemm split</text>

    <!-- PP -->
    <rect x="275" y="565" width="180" height="140" rx="5" fill="#fff" stroke="#2869e6" stroke-width="1.5"/>
    <text x="365" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="#2869e6">PP</text>
    <text x="365" y="601" text-anchor="middle" font-size="10" fill="#27262b">pipeline parallel</text>
    <line x1="295" y1="612" x2="435" y2="612" stroke="#e6e1e8"/>
    <text x="365" y="628" text-anchor="middle" font-size="9" fill="#5c5962">split layers across</text>
    <text x="365" y="640" text-anchor="middle" font-size="9" fill="#5c5962">pipeline stages</text>
    <text x="365" y="660" text-anchor="middle" font-size="9" fill="#5c5962" font-style="italic">cross-machine</text>
    <text x="365" y="672" text-anchor="middle" font-size="9" fill="#5c5962" font-style="italic">InfiniBand-bound</text>
    <text x="365" y="692" text-anchor="middle" font-size="8" fill="#2869e6">1F1B schedule; bubble matters</text>

    <!-- DP -->
    <rect x="470" y="565" width="180" height="140" rx="5" fill="#fff" stroke="#026e57" stroke-width="1.5"/>
    <text x="560" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="#026e57">DP</text>
    <text x="560" y="601" text-anchor="middle" font-size="10" fill="#27262b">data parallel</text>
    <line x1="490" y1="612" x2="630" y2="612" stroke="#e6e1e8"/>
    <text x="560" y="628" text-anchor="middle" font-size="9" fill="#5c5962">replicate the model</text>
    <text x="560" y="640" text-anchor="middle" font-size="9" fill="#5c5962">split the batch</text>
    <text x="560" y="660" text-anchor="middle" font-size="9" fill="#5c5962" font-style="italic">outer loop</text>
    <text x="560" y="672" text-anchor="middle" font-size="9" fill="#5c5962" font-style="italic">tolerant of slow links</text>
    <text x="560" y="692" text-anchor="middle" font-size="8" fill="#026e57">GRPO uid must travel with batch</text>

    <!-- EP -->
    <rect x="665" y="565" width="180" height="140" rx="5" fill="#fff" stroke="#b85c00" stroke-width="1.5"/>
    <text x="755" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="#b85c00">EP</text>
    <text x="755" y="601" text-anchor="middle" font-size="10" fill="#27262b">expert parallel</text>
    <line x1="685" y1="612" x2="825" y2="612" stroke="#e6e1e8"/>
    <text x="755" y="628" text-anchor="middle" font-size="9" fill="#5c5962">split MoE experts</text>
    <text x="755" y="640" text-anchor="middle" font-size="9" fill="#5c5962">across GPUs</text>
    <text x="755" y="660" text-anchor="middle" font-size="9" fill="#5c5962" font-style="italic">needed above ~30B MoE</text>
    <text x="755" y="672" text-anchor="middle" font-size="9" fill="#5c5962" font-style="italic">DeepSeek-V3 · Qwen-MoE</text>
    <text x="755" y="692" text-anchor="middle" font-size="8" fill="#b85c00">R3 replay anchors routing here</text>

    <!-- CP -->
    <rect x="860" y="565" width="180" height="140" rx="5" fill="#fff" stroke="#ea580c" stroke-width="1.5"/>
    <text x="950" y="585" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">CP</text>
    <text x="950" y="601" text-anchor="middle" font-size="10" fill="#27262b">context parallel</text>
    <line x1="880" y1="612" x2="1020" y2="612" stroke="#e6e1e8"/>
    <text x="950" y="628" text-anchor="middle" font-size="9" fill="#5c5962">split the sequence</text>
    <text x="950" y="640" text-anchor="middle" font-size="9" fill="#5c5962">dimension</text>
    <text x="950" y="660" text-anchor="middle" font-size="9" fill="#5c5962" font-style="italic">long context (32K+)</text>
    <text x="950" y="672" text-anchor="middle" font-size="9" fill="#5c5962" font-style="italic">video tokens (100K+)</text>
    <text x="950" y="692" text-anchor="middle" font-size="8" fill="#ea580c">multi-turn agent rollouts</text>
  </g>

  <!-- Bottom call-out -->
  <rect x="60" y="740" width="980" height="48" rx="6" fill="#f5f2ff" stroke="#7253ed"/>
  <text x="550" y="760" text-anchor="middle" font-size="12" fill="#27262b">
    <tspan font-weight="600">The principle:</tspan> communication intensity decreases left → right.
    Place the densest collectives (TP) on the fastest hardware (NVLink), the sparsest (PP) on the slowest (cross-rack).
  </text>
  <text x="550" y="778" text-anchor="middle" font-size="11" fill="#5c5962" font-style="italic">
    Each framework's recipe (Miles' DeepSeek-V3, slime, verl) picks a point in this 5D grid based on cluster topology.
  </text>
</svg>
